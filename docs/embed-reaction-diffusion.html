<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What Spreading-Out Creates</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0908;
  overflow: hidden;
  font-family: 'JetBrains Mono', monospace;
  cursor: crosshair;
}
canvas { display: block; position: fixed; top: 0; left: 0; }
#title {
  position: fixed; top: 20px; left: 24px; z-index: 10;
  pointer-events: none;
  color: rgba(160, 145, 120, 0.12);
  font-size: 9px; font-weight: 300;
  letter-spacing: 0.15em; text-transform: uppercase;
}
#sub {
  position: fixed; top: 34px; left: 24px; z-index: 10;
  pointer-events: none;
  color: rgba(160, 145, 120, 0.08);
  font-size: 8px; font-weight: 200;
  letter-spacing: 0.1em; font-style: italic;
}
#info {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  color: rgba(160, 145, 120, 0.35); font-size: 9px; font-weight: 300;
  letter-spacing: 0.06em; pointer-events: none; z-index: 10;
  text-align: center;
  transition: opacity 6s ease;
}
#stats {
  position: fixed; top: 20px; right: 24px; z-index: 10;
  pointer-events: none;
  color: rgba(160, 145, 120, 0.18);
  font-size: 8px; font-weight: 300;
  letter-spacing: 0.04em;
  text-align: right;
  line-height: 1.8;
}
#insight {
  position: fixed; bottom: 58px; left: 50%; transform: translateX(-50%);
  pointer-events: none; z-index: 10;
  text-align: center;
  max-width: 520px;
  line-height: 1.8;
  font-size: 9px; font-weight: 200;
  letter-spacing: 0.06em;
  opacity: 0;
  transition: opacity 4s ease;
  color: rgba(200, 180, 150, 0.5);
  white-space: pre-line;
}
#mode-label {
  position: fixed; top: 56px; left: 24px; z-index: 10;
  pointer-events: none;
  color: rgba(160, 145, 120, 0.20);
  font-size: 8px; font-weight: 200;
  letter-spacing: 0.08em;
  transition: opacity 2s ease;
}
</style>
</head>
<body>
<div id="title">what spreading-out creates</div>
<div id="sub">reaction-diffusion</div>
<div id="mode-label"></div>
<div id="info">click to seed · scroll to change dynamics · space to dissolve inhibitor · r to reset</div>
<div id="stats"></div>
<div id="insight"></div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- Grid ---
const N = 200;
const NN = N * N;

let u = new Float32Array(NN);
let v = new Float32Array(NN);
let uN = new Float32Array(NN);
let vN = new Float32Array(NN);

// --- Gray-Scott parameters ---
// Standard diffusion coefficients (CFL-stable with dt=1, dx=1)
const Du = 0.2097;
const Dv = 0.105;

// Presets — well-tested parameter regions
const PRESETS = [
  { F: 0.0340, k: 0.0618, name: 'mitosis' },
  { F: 0.0260, k: 0.0600, name: 'coral' },
  { F: 0.0420, k: 0.0630, name: 'spots' },
  { F: 0.0580, k: 0.0650, name: 'stripes' },
  { F: 0.0140, k: 0.0530, name: 'worms' },
  { F: 0.0460, k: 0.0640, name: 'waves' },
];

let currentPreset = 0;
let F = PRESETS[0].F;
let k = PRESETS[0].k;

// --- Inhibitor ---
let inhibitorActive = true;
let inhibitorStrength = 1.0;
let inhibitorTarget = 1.0;

// --- Mouse ---
let mx = -1, my = -1;
let mouseIn = false;
let mouseDown = false;

// --- Canvas / rendering ---
let W, H;
const offscreen = document.createElement('canvas');
offscreen.width = N;
offscreen.height = N;
const offCtx = offscreen.getContext('2d');
let imgData = offCtx.createImageData(N, N);

// --- Tracking ---
let frame = 0;
let totalSeeded = 0;
let coverage = 0;
let shownInsights = new Set();
let startTime = Date.now();
let simSize, ox, oy; // simulation area on screen

// --- Color LUT (256 entries, 4 bytes each) ---
const LUT = new Uint8Array(1024);
(function buildLUT() {
  for (let i = 0; i < 256; i++) {
    const t = i / 255;
    let r, g, b;
    if (t < 0.05) {
      // near-black void
      const s = t / 0.05;
      r = 10 + s * 5;
      g = 9 + s * 3;
      b = 8 + s * 12;
    } else if (t < 0.2) {
      // void → deep indigo
      const s = (t - 0.05) / 0.15;
      r = 15 + s * 15;
      g = 12 + s * 12;
      b = 20 + s * 40;
    } else if (t < 0.4) {
      // indigo → teal
      const s = (t - 0.2) / 0.2;
      r = 30 - s * 8;
      g = 24 + s * 50;
      b = 60 + s * 25;
    } else if (t < 0.6) {
      // teal → warm violet
      const s = (t - 0.4) / 0.2;
      r = 22 + s * 100;
      g = 74 - s * 5;
      b = 85 + s * 10;
    } else if (t < 0.8) {
      // violet → rose
      const s = (t - 0.6) / 0.2;
      r = 122 + s * 58;
      g = 69 + s * 5;
      b = 95 - s * 18;
    } else if (t < 0.92) {
      // rose → amber
      const s = (t - 0.8) / 0.12;
      r = 180 + s * 40;
      g = 74 + s * 56;
      b = 77 - s * 35;
    } else {
      // amber → bright gold
      const s = (t - 0.92) / 0.08;
      r = 220 + s * 30;
      g = 130 + s * 40;
      b = 42 + s * 12;
    }
    const j = i << 2;
    LUT[j]     = Math.min(255, Math.max(0, r | 0));
    LUT[j + 1] = Math.min(255, Math.max(0, g | 0));
    LUT[j + 2] = Math.min(255, Math.max(0, b | 0));
    LUT[j + 3] = 255;
  }
})();

// --- Init ---
function init() {
  for (let i = 0; i < NN; i++) {
    u[i] = 1.0;
    v[i] = 0.0;
  }
}

function seedAt(cx, cy, r) {
  r = r || 4;
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      if (dx * dx + dy * dy > r * r) continue;
      const x = ((cx + dx) % N + N) % N;
      const y = ((cy + dy) % N + N) % N;
      const i = y * N + x;
      u[i] = 0.5 + Math.random() * 0.1;
      v[i] = 0.25 + Math.random() * 0.1;
    }
  }
  totalSeeded++;
}

function seedRandom() {
  const count = 6 + (Math.random() * 6) | 0;
  for (let i = 0; i < count; i++) {
    seedAt((Math.random() * N) | 0, (Math.random() * N) | 0, 3 + (Math.random() * 3) | 0);
  }
  totalSeeded = count;
}

// --- 9-point weighted Laplacian (more stable) ---
// Weights: center = -1, adjacent = 0.2, diagonal = 0.05
function step() {
  inhibitorStrength += (inhibitorTarget - inhibitorStrength) * 0.015;

  const ek = k * (0.3 + 0.7 * inhibitorStrength); // inhibitor modulates kill rate

  // Convert mouse to grid coords for local effects
  let gmx = -1, gmy = -1;
  if (mouseIn) {
    gmx = ((mx - ox) / simSize * N) | 0;
    gmy = ((my - oy) / simSize * N) | 0;
  }

  for (let y = 0; y < N; y++) {
    const ym = (y - 1 + N) % N;
    const yp = (y + 1) % N;
    const yN = y * N;
    const ymN = ym * N;
    const ypN = yp * N;

    for (let x = 0; x < N; x++) {
      const xm = (x - 1 + N) % N;
      const xp = (x + 1) % N;
      const i = yN + x;

      const uv = u[i];
      const vv = v[i];
      const uvv = uv * vv * vv;

      // 9-point Laplacian
      const lapU = 0.2 * (u[yN + xm] + u[yN + xp] + u[ymN + x] + u[ypN + x])
                 + 0.05 * (u[ymN + xm] + u[ymN + xp] + u[ypN + xm] + u[ypN + xp])
                 - uv;
      const lapV = 0.2 * (v[yN + xm] + v[yN + xp] + v[ymN + x] + v[ypN + x])
                 + 0.05 * (v[ymN + xm] + v[ymN + xp] + v[ypN + xm] + v[ypN + xp])
                 - vv;

      // Local cursor effect: strengthen inhibition near gaze
      let lk = ek;
      if (gmx >= 0 && inhibitorActive) {
        const ddx = x - gmx;
        const ddy = y - gmy;
        const d2 = ddx * ddx + ddy * ddy;
        if (d2 < 900) { // radius ~30
          const inf = 1 - Math.sqrt(d2) / 30;
          lk = ek * (1 + inf * 0.25);
        }
      }

      uN[i] = uv + Du * lapU - uvv + F * (1.0 - uv);
      vN[i] = vv + Dv * lapV + uvv - (F + lk) * vv;

      // Clamp to [0, 1]
      if (uN[i] < 0) uN[i] = 0; else if (uN[i] > 1) uN[i] = 1;
      if (vN[i] < 0) vN[i] = 0; else if (vN[i] > 1) vN[i] = 1;
    }
  }

  // Swap buffers
  const tu = u; u = uN; uN = tu;
  const tv = v; v = vN; vN = tv;
}

// --- Render ---
function render() {
  const d = imgData.data;
  let active = 0;

  for (let i = 0; i < NN; i++) {
    const vv = v[i];
    if (vv > 0.04) active++;

    // Map V to color index — V typically ranges 0 to ~0.5
    const ci = Math.min(255, Math.max(0, (vv * 510) | 0));
    const li = ci << 2;
    const pi = i << 2;
    d[pi]     = LUT[li];
    d[pi + 1] = LUT[li + 1];
    d[pi + 2] = LUT[li + 2];
    d[pi + 3] = 255;
  }

  coverage = active / NN;

  offCtx.putImageData(imgData, 0, 0);

  // Clear and draw
  ctx.fillStyle = '#0a0908';
  ctx.fillRect(0, 0, W, H);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(offscreen, ox, oy, simSize, simSize);

  // Subtle frame
  ctx.strokeStyle = 'rgba(160, 145, 120, 0.03)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(ox, oy, simSize, simSize);

  // Cursor ring showing inhibition radius
  if (mouseIn && inhibitorActive) {
    const r = 30 * (simSize / N);
    ctx.beginPath();
    ctx.arc(mx, my, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(160, 145, 120, ${0.05 * inhibitorStrength})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

// --- Insights ---
const INSIGHTS = [
  { id: 0, test: () => totalSeeded >= 1 && frame > 10 && frame < 400,
    text: 'symmetry broken · noise selects which realization' },
  { id: 1, test: () => coverage > 0.03,
    text: 'diffusion — which should homogenize —\ncreates pattern when two substances\ndiffuse at different rates' },
  { id: 2, test: () => coverage > 0.10,
    text: 'the inhibitor is the condition of pattern\nnot its enemy' },
  { id: 3, test: () => coverage > 0.25,
    text: 'no cell knows it is part of a spot\nno molecule follows a blueprint' },
  { id: 4, test: () => !inhibitorActive,
    text: 'without long-range inhibition\nthe activator is everywhere\nwhich is the same as nowhere' },
  { id: 5, test: () => inhibitorActive && shownInsights.has(4) && inhibitorStrength > 0.85 && coverage > 0.05,
    text: 'the suppressor returns\nstructure crystallizes from uniformity' },
  { id: 6, test: () => coverage > 0.35,
    text: '"asymmetry is what creates a phenomenon"\n— curie' },
  { id: 7, test: () => frame > 4000,
    text: 'necessary form · contingent realization\nthe type is determined by parameters\nthe arrangement by noise' },
  { id: 8, test: () => frame > 8000,
    text: 'pattern requires memory\nnot the memory of a mind\nthe memory of a molecule that stays put' },
];

let insightTimer = 0;

function updateInsights() {
  if (insightTimer > 0) {
    insightTimer--;
    if (insightTimer === 0) {
      document.getElementById('insight').style.opacity = '0';
    }
    return;
  }

  for (const ins of INSIGHTS) {
    if (!shownInsights.has(ins.id) && ins.test()) {
      shownInsights.add(ins.id);
      const el = document.getElementById('insight');
      el.textContent = ins.text;
      el.style.opacity = '1';
      insightTimer = 420; // ~7s
      break;
    }
  }
}

// --- Stats ---
function updateStats() {
  document.getElementById('stats').innerHTML = [
    `pattern: ${PRESETS[currentPreset].name}`,
    `coverage: ${(coverage * 100).toFixed(1)}%`,
    `inhibitor: ${inhibitorActive ? (inhibitorStrength * 100).toFixed(0) + '%' : 'dissolved'}`,
    `F: ${F.toFixed(4)} · k: ${k.toFixed(4)}`,
    `step: ${frame * 10}`,
  ].join('<br>');
}

// --- Resize ---
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  simSize = Math.min(W, H) * 0.88;
  ox = (W - simSize) / 2;
  oy = (H - simSize) / 2;
}

// --- Screen → grid conversion ---
function screenToGrid(sx, sy) {
  const gx = ((sx - ox) / simSize * N) | 0;
  const gy = ((sy - oy) / simSize * N) | 0;
  return (gx >= 0 && gx < N && gy >= 0 && gy < N) ? [gx, gy] : null;
}

// --- Events ---
canvas.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY; mouseIn = true;
  if (mouseDown) {
    const g = screenToGrid(mx, my);
    if (g) seedAt(g[0], g[1], 2);
  }
});
canvas.addEventListener('mouseleave', () => { mouseIn = false; });
canvas.addEventListener('mousedown', e => {
  mouseDown = true;
  const g = screenToGrid(e.clientX, e.clientY);
  if (g) seedAt(g[0], g[1], 4);
});
canvas.addEventListener('mouseup', () => { mouseDown = false; });

window.addEventListener('wheel', e => {
  e.preventDefault();
  currentPreset = (currentPreset + (e.deltaY > 0 ? 1 : -1) + PRESETS.length) % PRESETS.length;
  F = PRESETS[currentPreset].F;
  k = PRESETS[currentPreset].k;
  const ml = document.getElementById('mode-label');
  ml.textContent = PRESETS[currentPreset].name;
  ml.style.opacity = '1';
  setTimeout(() => { ml.style.opacity = '0'; }, 2500);
}, { passive: false });

window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    inhibitorActive = !inhibitorActive;
    inhibitorTarget = inhibitorActive ? 1.0 : 0.12;
  }
  if (e.code === 'KeyR') {
    init();
    seedRandom();
    frame = 0;
    startTime = Date.now();
    shownInsights.clear();
    inhibitorActive = true;
    inhibitorTarget = 1.0;
    inhibitorStrength = 1.0;
  }
});

window.addEventListener('resize', resize);

// --- Main loop ---
function animate() {
  // 10 simulation steps per animation frame
  for (let i = 0; i < 10; i++) step();

  render();

  if (frame % 6 === 0) {
    updateStats();
    updateInsights();
  }

  if (totalSeeded > 0 && frame === 400) {
    document.getElementById('info').style.opacity = '0';
  }

  frame++;
  requestAnimationFrame(animate);
}

// --- Start ---
resize();
init();
seedRandom();
animate();
</script>
</body>
</html>
