<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Non-Ergodic Walk</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06060a;
    overflow: hidden;
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    cursor: none;
  }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #info {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(140, 135, 160, 0.35); font-size: 9px; font-weight: 300;
    letter-spacing: 0.08em; pointer-events: none; z-index: 10;
    transition: opacity 4s;
  }
  #title {
    position: fixed; top: 20px; left: 24px;
    color: rgba(140, 135, 160, 0.15); font-size: 9px; font-weight: 300;
    letter-spacing: 0.15em; text-transform: uppercase; pointer-events: none;
    z-index: 10;
  }
  #insight {
    position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%);
    color: rgba(180, 165, 140, 0); font-size: 9px; font-weight: 300;
    letter-spacing: 0.06em; pointer-events: none; z-index: 10;
    transition: color 6s;
    white-space: nowrap;
  }
  #stats {
    position: fixed; top: 20px; right: 24px;
    color: rgba(140, 135, 160, 0); font-size: 9px; font-weight: 300;
    letter-spacing: 0.04em; pointer-events: none; z-index: 10;
    text-align: right; line-height: 1.6;
    transition: color 3s;
  }
</style>
</head>
<body>
<div id="title">non-ergodic walk</div>
<div id="info">move through the field &middot; scroll to adjust reach &middot; space for the path</div>
<div id="insight"></div>
<div id="stats"></div>
<canvas id="c"></canvas>
<canvas id="over"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const over = document.getElementById('over');
const octx = over.getContext('2d');
const statsEl = document.getElementById('stats');
const insightEl = document.getElementById('insight');

let W, H;
const CELL = 6;
let cols, rows;

let field, ripple, rvel;
let mx = -200, my = -200, pmx = -200, pmy = -200;
let time = 0, frame = 0;
let totalDist = 0, maxVal = 0, explored = 0;
let influence = 5;
let insightN = -1, insightTimer = null;
let showGhost = false;
const trail = [];
const particles = [];
const MAXP = 300;

const PAL = [
  [15, 18, 48],
  [32, 28, 72],
  [62, 42, 98],
  [105, 58, 88],
  [155, 90, 58],
  [200, 145, 68],
  [225, 195, 135],
];

function init() {
  W = canvas.width = over.width = innerWidth;
  H = canvas.height = over.height = innerHeight;
  cols = Math.ceil(W / CELL);
  rows = Math.ceil(H / CELL);
  const n = cols * rows;
  field = new Float32Array(n);
  ripple = new Float32Array(n);
  rvel = new Float32Array(n);
  explored = 0;
  maxVal = 0;

  // Ambient particles — the untouched field, alive with possibility
  particles.length = 0;
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.12,
      vy: (Math.random() - 0.5) * 0.12,
      life: 1,
      size: 0.5 + Math.random() * 0.8,
      ambient: true
    });
  }
}
init();
addEventListener('resize', init);

addEventListener('mousemove', e => {
  pmx = mx; pmy = my;
  mx = e.clientX; my = e.clientY;
});

addEventListener('wheel', e => {
  e.preventDefault();
  influence = Math.max(2, Math.min(14, influence + (e.deltaY > 0 ? -0.4 : 0.4)));
}, { passive: false });

addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); showGhost = true; }
});
addEventListener('keyup', e => {
  if (e.code === 'Space') showGhost = false;
});

function at(i, j) { return j * cols + i; }
function lerp(a, b, t) { return a + (b - a) * t; }

function colorAt(v) {
  if (v < 0.003) return null;
  v = Math.min(v, 6);
  // Square root mapping: spreads the low end for better visibility
  // val 0.1 → t 0.13, val 0.5 → t 0.29, val 1 → t 0.41, val 3 → t 0.71
  const t = Math.sqrt(v / 6);
  const pos = t * (PAL.length - 1);
  const i = Math.min(Math.floor(pos), PAL.length - 2);
  const f = pos - i;
  return [
    lerp(PAL[i][0], PAL[i + 1][0], f),
    lerp(PAL[i][1], PAL[i + 1][1], f),
    lerp(PAL[i][2], PAL[i + 1][2], f),
    0.3 + t * 0.65
  ];
}

// --- Walk: the cursor deforms the field permanently ---
function applyWalk() {
  const dx = mx - pmx, dy = my - pmy;
  const speed = Math.sqrt(dx * dx + dy * dy);
  if (speed < 0.3 || mx < 0) return;

  // Consume the movement so it's only processed once per mouse event
  pmx = mx; pmy = my;

  totalDist += speed;

  if (frame % 3 === 0) {
    trail.push(mx, my);
    if (trail.length > 10000) trail.splice(0, 2);
  }

  const ci = Math.floor(mx / CELL);
  const cj = Math.floor(my / CELL);
  const lv = (ci >= 0 && ci < cols && cj >= 0 && cj < rows)
    ? field[at(ci, cj)] : 0;

  // Influence radius grows in already-walked areas
  const radius = influence + Math.min(lv * 1.5, 6);
  const str = 0.04;
  const r = Math.ceil(radius);

  for (let dj = -r; dj <= r; dj++) {
    for (let di = -r; di <= r; di++) {
      const i = ci + di, j = cj + dj;
      if (i < 0 || i >= cols || j < 0 || j >= rows) continue;
      const d = Math.sqrt(di * di + dj * dj);
      if (d > radius) continue;

      const fall = 1 - d / radius;
      const k = at(i, j);
      const cur = field[k];
      const wasLow = cur < 0.003;

      // Multiplicative: each passage compounds on what's already there
      field[k] += str * fall * fall * (1 + cur * 0.4);
      rvel[k] += str * fall * 2.5;

      if (wasLow && field[k] >= 0.003) explored++;
      if (field[k] > maxVal) maxVal = field[k];
    }
  }

  // Wake particles
  if (Math.random() < 0.2 + speed * 0.02) {
    const ang = Math.atan2(dy, dx) + (Math.random() - 0.5) * 1.8;
    const sp = 0.2 + Math.random() * 0.3;
    if (particles.length < MAXP) {
      particles.push({
        x: mx + (Math.random() - 0.5) * 8,
        y: my + (Math.random() - 0.5) * 8,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp,
        life: 1,
        size: 0.7 + Math.random() * 1.2,
        ambient: false
      });
    }
  }

  checkInsight();
}

// --- Ripple: brief waves from passage, settling into the permanent field ---
function doRipple() {
  const sp = 0.12, damp = 0.955;
  for (let j = 1; j < rows - 1; j++) {
    for (let i = 1; i < cols - 1; i++) {
      const k = at(i, j);
      const avg = (ripple[at(i - 1, j)] + ripple[at(i + 1, j)] +
        ripple[at(i, j - 1)] + ripple[at(i, j + 1)]) * 0.25;
      rvel[k] += (avg - ripple[k]) * sp;
      rvel[k] *= damp;
    }
  }
  for (let k = 0; k < ripple.length; k++) ripple[k] += rvel[k];
}

// --- Diffusion: the field bleeds slowly outward, never retracting ---
function diffuse() {
  const rate = 0.0008;
  for (let j = 1; j < rows - 1; j++) {
    for (let i = 1; i < cols - 1; i++) {
      const k = at(i, j);
      const avg = (field[at(i - 1, j)] + field[at(i + 1, j)] +
        field[at(i, j - 1)] + field[at(i, j + 1)]) * 0.25;
      field[k] += (avg - field[k]) * rate;
    }
  }
}

// --- Particles: repelled by the field, accumulating in the unexplored ---
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    if (!p.ambient) {
      p.life -= 0.0018;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
    }

    const ci = Math.floor(p.x / CELL);
    const cj = Math.floor(p.y / CELL);

    if (ci > 0 && ci < cols - 1 && cj > 0 && cj < rows - 1) {
      const gx = (field[at(ci + 1, cj)] - field[at(ci - 1, cj)]) * 0.12;
      const gy = (field[at(ci, cj + 1)] - field[at(ci, cj - 1)]) * 0.12;
      p.vx -= gx * 0.012;
      p.vy -= gy * 0.012;
    }

    p.vx += (Math.random() - 0.5) * 0.015;
    p.vy += (Math.random() - 0.5) * 0.015;
    p.vx *= 0.988;
    p.vy *= 0.988;
    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 5) p.vx += 0.02;
    if (p.x > W - 5) p.vx -= 0.02;
    if (p.y < 5) p.vy += 0.02;
    if (p.y > H - 5) p.vy -= 0.02;
    p.x = Math.max(0, Math.min(W, p.x));
    p.y = Math.max(0, Math.min(H, p.y));
  }
}

// --- Insights: emerging text at thresholds ---
const insights = [
  'the walker shapes the land',
  'the land shapes the walker',
  'you cannot step in the same river twice',
  'another trajectory, another world',
  'the state is the identity \u00b7 the measurements are the life'
];

function checkInsight() {
  const next = insightN + 1;
  if (next >= insights.length) return;

  let trigger = false;
  if (next === 0 && totalDist > 300) trigger = true;
  if (next === 1) {
    const ci = Math.floor(mx / CELL), cj = Math.floor(my / CELL);
    if (ci >= 0 && ci < cols && cj >= 0 && cj < rows && field[at(ci, cj)] > 2.5)
      trigger = true;
  }
  if (next === 2 && totalDist > 2500) trigger = true;
  if (next === 3 && totalDist > 7000) trigger = true;
  if (next === 4 && totalDist > 15000) trigger = true;

  if (trigger) {
    insightN = next;
    insightEl.textContent = insights[next];
    insightEl.style.color = 'rgba(180, 165, 140, 0.3)';
    if (insightTimer) clearTimeout(insightTimer);
    if (next < insights.length - 1) {
      insightTimer = setTimeout(() => {
        insightEl.style.color = 'rgba(180, 165, 140, 0)';
      }, 9000);
    }
  }
}

// --- Render ---
function render() {
  time += 0.016;
  frame++;

  applyWalk();
  if (frame % 2 === 0) doRipple();
  if (frame % 8 === 0) diffuse();
  updateParticles();

  const breathe = 1 + Math.sin(time * 0.35) * 0.015;

  ctx.fillStyle = '#06060a';
  ctx.fillRect(0, 0, W, H);

  // Render the deformed field
  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      const k = at(i, j);
      const val = field[k];
      if (val < 0.003) continue;

      const col = colorAt(val);
      if (!col) continue;

      const rip = 1 + ripple[k] * 0.2;
      const b = breathe * Math.max(0.5, rip);

      ctx.fillStyle = `rgba(${Math.min(255, Math.floor(col[0] * b))},${Math.min(255, Math.floor(col[1] * b))},${Math.min(255, Math.floor(col[2] * b))},${col[3]})`;
      ctx.fillRect(i * CELL, j * CELL, CELL, CELL);
    }
  }

  // Overlay
  octx.clearRect(0, 0, W, H);

  // Ghost mode: the raw path beneath the landscape
  if (showGhost) {
    octx.fillStyle = 'rgba(6, 6, 10, 0.55)';
    octx.fillRect(0, 0, W, H);

    if (trail.length > 3) {
      octx.beginPath();
      octx.moveTo(trail[0], trail[1]);
      for (let i = 2; i < trail.length; i += 2) {
        octx.lineTo(trail[i], trail[i + 1]);
      }
      octx.strokeStyle = 'rgba(180, 175, 195, 0.15)';
      octx.lineWidth = 0.8;
      octx.stroke();
    }
  }

  // Particles
  for (const p of particles) {
    const a = p.ambient ? 0.1 : p.life * 0.3;
    const ci = Math.floor(p.x / CELL);
    const cj = Math.floor(p.y / CELL);
    const lv = (ci >= 0 && ci < cols && cj >= 0 && cj < rows)
      ? field[at(ci, cj)] : 0;

    const warm = lv > 0.5;
    const pr = warm ? 175 : 90;
    const pg = warm ? 145 : 110;
    const pb = warm ? 105 : 158;

    octx.fillStyle = `rgba(${pr},${pg},${pb},${a})`;
    octx.beginPath();
    octx.arc(p.x, p.y, p.size * (p.ambient ? 1 : Math.max(0.3, p.life)), 0, Math.PI * 2);
    octx.fill();
  }

  // Cursor
  if (mx > 0 && my > 0) {
    const ci = Math.floor(mx / CELL);
    const cj = Math.floor(my / CELL);
    const lv = (ci >= 0 && ci < cols && cj >= 0 && cj < rows)
      ? field[at(ci, cj)] : 0;

    const gr = 18 + Math.min(lv * 10, 32);
    const ga = 0.02 + Math.min(lv * 0.008, 0.03);
    const warm = lv > 1;
    const cr = warm ? 195 : 115;
    const cg = warm ? 165 : 135;
    const cb = warm ? 125 : 180;

    const grad = octx.createRadialGradient(mx, my, 0, mx, my, gr);
    grad.addColorStop(0, `rgba(${cr},${cg},${cb},${ga * 2.5})`);
    grad.addColorStop(0.5, `rgba(${cr},${cg},${cb},${ga})`);
    grad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    octx.fillStyle = grad;
    octx.fillRect(mx - gr, my - gr, gr * 2, gr * 2);

    octx.beginPath();
    octx.arc(mx, my, 1.5, 0, Math.PI * 2);
    octx.fillStyle = 'rgba(210,205,220,0.5)';
    octx.fill();
  }

  // Stats
  if (frame % 30 === 0 && totalDist > 50) {
    const pct = ((explored / (cols * rows)) * 100).toFixed(1);
    statsEl.style.color = 'rgba(140, 135, 160, 0.2)';
    statsEl.innerHTML = `explored: ${pct}%<br>depth: ${maxVal.toFixed(1)}<br>reach: ${influence.toFixed(1)}`;
  }

  requestAnimationFrame(render);
}

render();
setTimeout(() => { document.getElementById('info').style.opacity = '0'; }, 8000);
</script>
</body>
</html>
