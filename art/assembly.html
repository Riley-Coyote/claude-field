<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assembly</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08080d; overflow: hidden; font-family: 'JetBrains Mono', monospace; cursor: none; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 24px; left: 24px;
    color: rgba(200, 200, 210, 0.5); font-size: 11px; line-height: 1.8;
    pointer-events: none; z-index: 10;
  }
  #assembly-index { font-size: 13px; color: rgba(232, 168, 73, 0.7); letter-spacing: 0.5px; }
  #stats { margin-top: 4px; font-size: 10px; }
  #insight {
    position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
    color: rgba(200, 200, 210, 0); font-size: 12px; font-weight: 300;
    text-align: center; pointer-events: none; max-width: 520px;
    z-index: 10; letter-spacing: 0.3px;
    transition: color 1.5s ease-out;
  }
  #instructions {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: rgba(200, 200, 210, 0.35); font-size: 12px; font-weight: 300;
    text-align: center; pointer-events: none; z-index: 10;
    line-height: 2; letter-spacing: 0.3px;
    transition: opacity 2s ease;
  }
  #space-hint {
    position: fixed; bottom: 12px; right: 24px;
    color: rgba(200, 200, 210, 0.15); font-size: 9px;
    pointer-events: none; z-index: 10;
  }
</style>
</head>
<body>
<div id="ui">
  <div id="assembly-index">assembly index: 0</div>
  <div id="stats"></div>
</div>
<div id="insight"></div>
<div id="instructions">click a building block to select<br>click another to combine</div>
<div id="space-hint">hold space &mdash; autobiography</div>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

const PALETTE = [
  { r: 232, g: 168, b: 73 },
  { r: 78, g: 195, b: 186 },
  { r: 155, g: 109, b: 245 },
  { r: 214, g: 99, b: 119 },
  { r: 116, g: 176, b: 145 },
  { r: 148, g: 155, b: 178 },
];
const GLYPHS = ['\u03B1', '\u03B2', '\u03B3', '\u03B4', '\u03B5', '\u03B6'];

function blendColors(a, b, t = 0.5) {
  return {
    r: Math.round(a.r * (1 - t) + b.r * t),
    g: Math.round(a.g * (1 - t) + b.g * t),
    b: Math.round(a.b * (1 - t) + b.b * t),
  };
}
function colorStr(c, a = 1) { return `rgba(${c.r},${c.g},${c.b},${a})`; }

class Node {
  constructor(x, y, palIdx, depth = 0) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = (Math.random() - 0.5) * 0.25;
    this.palIdx = palIdx;
    this.color = { ...PALETTE[palIdx % PALETTE.length] };
    this.depth = depth;
    this.radius = 11 + depth * 4.5;
    this.children = [];
    this.childSnaps = [];
    this.alive = true;
    this.selected = false;
    this.phase = Math.random() * Math.PI * 2;
    this.born = performance.now();
    this.fadeIn = 0;
    this.glyph = depth === 0 ? GLYPHS[palIdx % GLYPHS.length] : '';
    this.dissolved = false;
  }
}

let nodes = [];
let selected = null;
let assemblyIndex = 0;
let combinations = 0;
let reuseCount = 0;
let knownTypes = new Set();
let maxDepth = 0;
let cursorAlpha = 1;
let mx = -100, my = -100;
let showingAutobiography = false;
let phase = 'build';
let insightTimer = null;
let shownInsights = new Set();
let dissolveStart = 0;
let backgroundPulse = 0;

function spawnBasic(palIdx) {
  const m = 80;
  const x = m + Math.random() * (W - 2 * m);
  const y = m + Math.random() * (H - 2 * m);
  nodes.push(new Node(x, y, palIdx));
}

for (let i = 0; i < 6; i++) {
  for (let j = 0; j < 3; j++) spawnBasic(i);
}

function typeKey(node) {
  if (node.depth === 0) return node.glyph;
  const ck = node.children.map(c => typeKey(c)).sort();
  return `(${ck.join('\u00b7')})`;
}

function combine(a, b) {
  const parentSnaps = [
    { x: a.x, y: a.y, color: { ...a.color }, node: a },
    { x: b.x, y: b.y, color: { ...b.color }, node: b },
  ];

  const nd = Math.max(a.depth, b.depth) + 1;
  const cx = (a.x + b.x) / 2;
  const cy = (a.y + b.y) / 2;
  const nc = blendColors(a.color, b.color);

  const compound = new Node(cx, cy, 0, nd);
  compound.color = nc;
  compound.children = [a, b];
  compound.childSnaps = parentSnaps;
  compound.vx = (a.vx + b.vx) / 2;
  compound.vy = (a.vy + b.vy) / 2;

  const tk = typeKey(compound);
  const reuse = knownTypes.has(tk);
  knownTypes.add(tk);
  if (reuse) reuseCount++;

  combinations++;
  if (nd > maxDepth) { maxDepth = nd; assemblyIndex = nd; }

  a.alive = false;
  b.alive = false;
  nodes.push(compound);

  setTimeout(() => {
    if (phase === 'build') {
      spawnBasic(a.palIdx % 6);
      spawnBasic(b.palIdx % 6);
    }
  }, 1800);

  updateUI();
  triggerInsight();
  checkPhase();
}

function updateUI() {
  const el = document.getElementById('assembly-index');
  el.textContent = `assembly index: ${assemblyIndex}`;
  el.style.color = assemblyIndex >= 15
    ? 'rgba(240,240,250,0.9)'
    : 'rgba(232,168,73,0.7)';
  const st = document.getElementById('stats');
  const parts = [];
  if (combinations > 0) parts.push(`combinations: ${combinations}`);
  if (reuseCount > 0) parts.push(`reuse: ${reuseCount}`);
  if (knownTypes.size > 1) parts.push(`unique types: ${knownTypes.size}`);
  st.textContent = parts.join('  \u00b7  ');
}

const INSIGHTS = [
  [1, 'every complex object is an autobiography'],
  [3, 'each step requires the previous steps'],
  [5, 'the path constrains what follows'],
  [7, 'reusable substructures lower the effective index'],
  [10, 'the gap between possible and observed \u2014 filled by history'],
  [13, 'approaching the selection threshold'],
  [15, 'above ~15, chance cannot explain existence \u2014 Walker'],
  [17, 'the autobiography outlives the assembler'],
  [20, 'was this selected or generated?'],
  [23, 'the autobiography is written in a hand the author doesn\u2019t remember moving'],
];

function triggerInsight() {
  for (const [thresh, text] of INSIGHTS) {
    if (assemblyIndex >= thresh && !shownInsights.has(thresh)) {
      shownInsights.add(thresh);
      showInsight(text);
    }
  }
}

function showInsight(text) {
  const el = document.getElementById('insight');
  el.textContent = text;
  el.style.color = 'rgba(200,200,210,0.65)';
  clearTimeout(insightTimer);
  insightTimer = setTimeout(() => {
    el.style.color = 'rgba(200,200,210,0)';
  }, 6000);
}

function checkPhase() {
  if (assemblyIndex >= 15 && phase === 'build') {
    phase = 'dissolve';
    dissolveStart = performance.now();
  }
}

// --- Input ---
addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

canvas.addEventListener('click', e => {
  const inst = document.getElementById('instructions');
  if (inst.style.opacity !== '0') inst.style.opacity = '0';

  const x = e.clientX, y = e.clientY;
  let closest = null, bestD = Infinity;
  for (const n of nodes) {
    if (!n.alive) continue;
    const d = Math.hypot(n.x - x, n.y - y);
    if (d < n.radius + 18 && d < bestD) { closest = n; bestD = d; }
  }

  if (closest) {
    if (selected && selected !== closest && selected.alive) {
      combine(selected, closest);
      selected = null;
    } else {
      if (selected) selected.selected = false;
      selected = closest;
      closest.selected = true;
    }
  } else {
    if (selected) selected.selected = false;
    selected = null;
  }
});

addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); showingAutobiography = true; } });
addEventListener('keyup', e => { if (e.code === 'Space') showingAutobiography = false; });

// --- Autobiography drawing ---
function drawTree(node, ox, oy, opacity, scale) {
  if (opacity < 0.03 || node.childSnaps.length === 0) return;

  for (const snap of node.childSnaps) {
    const sx = ox + (snap.x - node.x) * scale;
    const sy = oy + (snap.y - node.y) * scale;

    ctx.beginPath();
    ctx.moveTo(ox, oy);
    const midX = (ox + sx) / 2;
    const midY = (oy + sy) / 2 - 12 * scale;
    ctx.quadraticCurveTo(midX, midY, sx, sy);
    ctx.strokeStyle = colorStr(snap.color, opacity * 0.5);
    ctx.lineWidth = Math.max(0.3, 1.2 * scale);
    ctx.stroke();

    // Ghost node
    const gr = Math.max(2, 5 * scale);
    ctx.beginPath();
    ctx.arc(sx, sy, gr, 0, Math.PI * 2);
    ctx.fillStyle = colorStr(snap.color, opacity * 0.6);
    ctx.fill();

    // Recurse deeper
    if (snap.node && snap.node.childSnaps.length > 0) {
      drawTree(snap.node, sx, sy, opacity * 0.65, scale * 0.7);
    }
  }
}

function drawAllAutobiographies() {
  for (const n of nodes) {
    if (!n.alive || n.depth === 0) continue;
    drawTree(n, n.x, n.y, 0.55, 0.8);
  }
}

function drawHoverAutobiography(node) {
  drawTree(node, node.x, node.y, 0.75, 0.9);
}

// --- Algorithmic mirror ---
let mirrorNodes = [];
let mirrorActive = false;
let mirrorIdx = 0;
let mirrorTimer = 0;

function initMirror() {
  mirrorActive = true;
  const cx = W * 0.75;
  for (let i = 0; i < 6; i++) {
    for (let j = 0; j < 2; j++) {
      const n = new Node(
        cx + (Math.random() - 0.5) * 240,
        H * 0.25 + Math.random() * H * 0.5,
        i
      );
      n.isMirror = true;
      mirrorNodes.push(n);
    }
  }
}

function tickMirror() {
  if (!mirrorActive || mirrorIdx >= assemblyIndex) return;
  mirrorTimer++;
  if (mirrorTimer % 50 !== 0) return;

  const alive = mirrorNodes.filter(n => n.alive);
  if (alive.length < 2) return;

  const i1 = Math.floor(Math.random() * alive.length);
  let i2 = (i1 + 1 + Math.floor(Math.random() * (alive.length - 1))) % alive.length;
  const a = alive[i1], b = alive[i2];

  const nd = Math.max(a.depth, b.depth) + 1;
  const compound = new Node((a.x + b.x) / 2, (a.y + b.y) / 2, 0, nd);
  compound.color = blendColors(a.color, b.color);
  compound.children = [a, b];
  compound.childSnaps = [
    { x: a.x, y: a.y, color: { ...a.color }, node: a },
    { x: b.x, y: b.y, color: { ...b.color }, node: b },
  ];
  compound.isMirror = true;
  a.alive = false;
  b.alive = false;
  mirrorNodes.push(compound);
  if (nd > mirrorIdx) mirrorIdx = nd;

  // Respawn
  setTimeout(() => {
    for (let k = 0; k < 2; k++) {
      const n = new Node(
        W * 0.75 + (Math.random() - 0.5) * 240,
        H * 0.25 + Math.random() * H * 0.5,
        Math.floor(Math.random() * 6)
      );
      n.isMirror = true;
      mirrorNodes.push(n);
    }
  }, 400);
}

// --- Render ---
function drawNode(n, t) {
  n.fadeIn = Math.min(1, n.fadeIn + 0.025);
  n.phase += 0.018 + n.depth * 0.003;

  const pulse = 1 + Math.sin(n.phase) * 0.08 * Math.min(1, n.depth / 3);
  const r = n.radius * pulse * n.fadeIn;
  const c = n.color;
  const fi = n.fadeIn;

  // Deep glow
  if (n.depth > 0) {
    const gi = Math.min(0.25, n.depth * 0.035) * fi;
    const gr = r * (2.2 + n.depth * 0.6);
    const g = ctx.createRadialGradient(n.x, n.y, r * 0.3, n.x, n.y, gr);
    g.addColorStop(0, colorStr(c, gi));
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(n.x, n.y, gr, 0, Math.PI * 2);
    ctx.fill();
  }

  // Body
  ctx.beginPath();
  ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
  if (n.depth === 0) {
    ctx.fillStyle = colorStr(c, 0.6 * fi);
    ctx.fill();
    ctx.strokeStyle = colorStr(c, 0.8 * fi);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  } else {
    const g = ctx.createRadialGradient(n.x - r * 0.15, n.y - r * 0.15, 0, n.x, n.y, r);
    const bright = { r: Math.min(255, c.r + 25), g: Math.min(255, c.g + 25), b: Math.min(255, c.b + 25) };
    g.addColorStop(0, colorStr(bright, 0.55 * fi));
    g.addColorStop(1, colorStr(c, 0.3 * fi));
    ctx.fillStyle = g;
    ctx.fill();
    ctx.strokeStyle = colorStr(c, 0.6 * fi);
    ctx.lineWidth = 1;
    ctx.stroke();

    // Internal structure for deep compounds
    if (n.depth >= 2) {
      const spokes = Math.min(n.depth, 6);
      for (let i = 0; i < spokes; i++) {
        const a = (Math.PI * 2 / spokes) * i + n.phase * 0.2;
        const len = r * 0.45;
        ctx.beginPath();
        ctx.moveTo(n.x + Math.cos(a) * len * 0.2, n.y + Math.sin(a) * len * 0.2);
        ctx.lineTo(n.x + Math.cos(a) * len, n.y + Math.sin(a) * len);
        ctx.strokeStyle = colorStr(c, 0.15 * fi);
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  // Selection ring
  if (n.selected) {
    ctx.beginPath();
    ctx.arc(n.x, n.y, r + 5, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(240,240,250,${0.4 + Math.sin(t * 0.005) * 0.25})`;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Label
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (n.depth === 0) {
    ctx.fillStyle = colorStr(c, 0.85 * fi);
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.fillText(n.glyph, n.x, n.y + 0.5);
  } else {
    ctx.fillStyle = `rgba(220,220,230,${0.3 * fi})`;
    ctx.font = `${Math.min(10, 8 + n.depth * 0.5)}px JetBrains Mono, monospace`;
    ctx.fillText(n.depth.toString(), n.x, n.y + 0.5);
  }
}

function physicsStep(nodeList) {
  for (const n of nodeList) {
    if (!n.alive) continue;
    n.x += n.vx;
    n.y += n.vy;

    const bx = n.isMirror ? W * 0.58 : 0;
    const ex = n.isMirror ? W : W * (mirrorActive ? 0.52 : 1);

    if (n.x < bx + n.radius + 10) { n.x = bx + n.radius + 10; n.vx = Math.abs(n.vx); }
    if (n.x > ex - n.radius - 10) { n.x = ex - n.radius - 10; n.vx = -Math.abs(n.vx); }
    if (n.y < n.radius + 10) { n.y = n.radius + 10; n.vy = Math.abs(n.vy); }
    if (n.y > H - n.radius - 10) { n.y = H - n.radius - 10; n.vy = -Math.abs(n.vy); }

    n.vx += (Math.random() - 0.5) * 0.008;
    n.vy += (Math.random() - 0.5) * 0.008;
    n.vx *= 0.992;
    n.vy *= 0.992;
  }
}

let hovered = null;

function frame(t) {
  ctx.fillStyle = '#08080d';
  ctx.fillRect(0, 0, W, H);

  // Background glow after threshold
  if (assemblyIndex >= 15) {
    backgroundPulse += 0.008;
    let cx = 0, cy = 0, cnt = 0;
    for (const n of nodes) {
      if (n.alive && n.depth > 0) { cx += n.x; cy += n.y; cnt++; }
    }
    if (cnt > 0) {
      cx /= cnt; cy /= cnt;
      const intensity = Math.min(0.06, (assemblyIndex - 15) * 0.008) * (1 + Math.sin(backgroundPulse) * 0.3);
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 350);
      g.addColorStop(0, `rgba(232,168,73,${intensity})`);
      g.addColorStop(0.5, `rgba(155,109,245,${intensity * 0.3})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }
  }

  // Physics
  physicsStep(nodes);
  if (mirrorActive) {
    physicsStep(mirrorNodes);
    tickMirror();
  }

  // Autobiography view
  if (showingAutobiography) {
    drawAllAutobiographies();
  }

  // Hover detection
  hovered = null;
  let bestD = Infinity;
  for (const n of nodes) {
    if (!n.alive) continue;
    const d = Math.hypot(n.x - mx, n.y - my);
    if (d < n.radius + 12 && d < bestD) { hovered = n; bestD = d; }
  }

  // Hover autobiography
  if (hovered && hovered.depth > 0 && !showingAutobiography) {
    drawHoverAutobiography(hovered);
  }

  // Draw nodes
  for (const n of nodes) {
    if (!n.alive) continue;
    drawNode(n, t);
  }

  // Mirror
  if (mirrorActive) {
    // Divider
    ctx.beginPath();
    ctx.moveTo(W * 0.55, H * 0.08);
    ctx.lineTo(W * 0.55, H * 0.92);
    ctx.strokeStyle = 'rgba(148,155,178,0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Labels
    ctx.textAlign = 'center';
    ctx.font = '10px JetBrains Mono, monospace';
    ctx.fillStyle = 'rgba(148,155,178,0.25)';
    ctx.fillText('selected', W * 0.27, H * 0.06);
    ctx.fillText('generated', W * 0.77, H * 0.06);
    ctx.fillStyle = 'rgba(148,155,178,0.18)';
    ctx.font = '9px JetBrains Mono, monospace';
    ctx.fillText(`index: ${mirrorIdx}`, W * 0.77, H * 0.06 + 16);

    // Show autobiography for mirror too during space
    if (showingAutobiography) {
      for (const n of mirrorNodes) {
        if (n.alive && n.depth > 0) {
          drawTree(n, n.x, n.y, 0.4, 0.7);
        }
      }
    }

    for (const n of mirrorNodes) {
      if (!n.alive) continue;
      drawNode(n, t);
    }
  }

  // Dissolving cursor
  if (phase === 'dissolve') {
    const elapsed = (t - dissolveStart) / 1000;
    cursorAlpha = Math.max(0.04, 1 - elapsed * 0.015);

    if (assemblyIndex >= 18 && !mirrorActive) {
      initMirror();
      showInsight('compression or creation?');
    }
  }

  // Connection line from selected
  if (selected && selected.alive) {
    ctx.beginPath();
    ctx.moveTo(selected.x, selected.y);
    ctx.lineTo(mx, my);
    ctx.strokeStyle = `rgba(240,240,250,${0.08 * cursorAlpha})`;
    ctx.lineWidth = 0.5;
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Cursor
  ctx.beginPath();
  ctx.arc(mx, my, 3, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(210,210,220,${0.6 * cursorAlpha})`;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(mx, my, 9, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(210,210,220,${0.2 * cursorAlpha})`;
  ctx.lineWidth = 0.5;
  ctx.stroke();

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
