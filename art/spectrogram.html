<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrogram</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060a08;
  overflow: hidden;
  cursor: crosshair;
  font-family: 'JetBrains Mono', monospace;
}
canvas { display: block; }
#hint {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(160, 180, 160, 0.35);
  font-size: 11px;
  letter-spacing: 0.08em;
  pointer-events: none;
  transition: opacity 1.5s;
}
#insight {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(0,0,0,0);
  font-size: 13px;
  letter-spacing: 0.03em;
  pointer-events: none;
  transition: color 2s ease;
  text-align: center;
  max-width: 520px;
  line-height: 1.7;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">click to listen</div>
<div id="insight"></div>
<script>
// --- Spectrogram ---
// An interactive acoustic ecosystem. Seven species occupy frequency bands,
// singing in their own rhythms. Your presence is ecological pressure —
// proximity silences species. Some damage never heals.
// When an expected sound doesn't come, the omission response appears:
// the prediction signal, louder than the sound itself.

const C = document.getElementById('c');
const ctx = C.getContext('2d');
const hint = document.getElementById('hint');
const insightEl = document.getElementById('insight');
let W, H, ecoH, specH;

// Spectrogram buffer (offscreen canvas)
const specCvs = document.createElement('canvas');
const specCtx = specCvs.getContext('2d');
let specWriteX = 0;

function resize() {
  W = C.width = innerWidth;
  H = C.height = innerHeight;
  specH = Math.floor(Math.min(90, H * 0.12));
  ecoH = H - specH;
  specCvs.width = W;
  specCvs.height = specH;
  specCtx.fillStyle = '#040604';
  specCtx.fillRect(0, 0, W, specH);
  specWriteX = 0;
  species.forEach((s, i) => {
    s.y = ecoH * (0.88 - (i / (species.length - 1)) * 0.76);
  });
  initParticles();
}

// --- Audio ---
let audioCtx = null;
let masterGain = null;
let audioOn = false;
let streamNodes = null;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.12;
  masterGain.connect(audioCtx.destination);

  // Continuous stream drone
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  const flt = audioCtx.createBiquadFilter();
  osc.type = 'sine';
  osc.frequency.value = 73.4; // D2
  flt.type = 'lowpass';
  flt.frequency.value = 180;
  g.gain.value = 0.05;
  osc.connect(flt);
  flt.connect(g);
  g.connect(masterGain);
  osc.start();
  streamNodes = { osc, gain: g };

  audioOn = true;
  hint.style.opacity = '0';
}

function playTone(freq, dur, vol) {
  if (!audioCtx || audioCtx.state === 'suspended') return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq * (0.998 + Math.random() * 0.004); // slight natural detuning
  g.gain.value = 0;
  osc.connect(g);
  g.connect(masterGain);
  const t = audioCtx.currentTime;
  const atk = Math.min(dur * 0.12, 0.025);
  g.gain.linearRampToValueAtTime(vol, t + atk);
  g.gain.setTargetAtTime(vol * 0.55, t + atk, dur * 0.25);
  g.gain.linearRampToValueAtTime(0, t + dur);
  osc.start(t);
  osc.stop(t + dur + 0.05);
}

// --- Species ---
const species = [
  { name: 'stream',       freq: 73,   rhythm: 0,    dur: 0,    col: [55, 95, 75],    amp: 0.05, continuous: true },
  { name: 'tree frog',    freq: 147,  rhythm: 1.4,  dur: 0.35, col: [210, 155, 45],  amp: 0.065 },
  { name: 'thrush',       freq: 294,  rhythm: 2.8,  dur: 0.55, col: [185, 165, 65],  amp: 0.045 },
  { name: 'warbler',      freq: 440,  rhythm: 2.0,  dur: 0.22, col: [105, 185, 85],  amp: 0.04 },
  { name: 'cicada',       freq: 587,  rhythm: 5.5,  dur: 1.6,  col: [65, 165, 165],  amp: 0.03 },
  { name: 'cricket',      freq: 880,  rhythm: 0.28, dur: 0.05, col: [135, 185, 225], amp: 0.022 },
  { name: 'night insect', freq: 1175, rhythm: 0.16, dur: 0.035,col: [165, 145, 205], amp: 0.018 }
];

// Per-species state
species.forEach((s, i) => {
  s.health = 1;
  s.maxHealth = 1;
  s.y = 0;
  s.nextBeat = s.rhythm > 0 ? Math.random() * s.rhythm : 0;
  s.reps = 0;
  s.singing = 0;
  s.particles = [];
  s.ghosts = [];
});

function initParticles() {
  species.forEach((s, i) => {
    s.particles = [];
    if (s.continuous) {
      // Stream: gentle flowing particles across the bottom
      for (let j = 0; j < 25; j++) {
        s.particles.push({
          ox: (Math.random() - 0.5) * W * 0.9,
          oy: (Math.random() - 0.5) * 22,
          vx: 0.08 + Math.random() * 0.15,
          phase: Math.random() * Math.PI * 2,
          size: 0.6 + Math.random() * 1.0
        });
      }
      return;
    }
    const n = 8 + i * 2;
    for (let j = 0; j < n; j++) {
      s.particles.push({
        ox: (Math.random() - 0.5) * W * 0.7,
        oy: (Math.random() - 0.5) * 28,
        vx: (Math.random() - 0.5) * 0.25,
        phase: Math.random() * Math.PI * 2,
        size: 1.2 + Math.random() * 2.2
      });
    }
  });
}

// --- Ambient dust ---
let dust = [];
function initDust() {
  dust = [];
  for (let i = 0; i < 50; i++) {
    dust.push({
      x: Math.random() * (W || 1400),
      y: Math.random() * (ecoH || 800),
      vx: Math.random() * 0.15 - 0.03,
      vy: -0.08 - Math.random() * 0.12,
      size: 0.4 + Math.random() * 0.8,
      alpha: 0.08 + Math.random() * 0.12
    });
  }
}

// --- Mouse ---
let mx = -999, my = -999;
let mouseIn = false;

// --- Time ---
let time = 0;
let lastT = performance.now();

// --- Config ---
const PRESSURE_R = 110;
const SUPPRESS_RATE = 0.0035;
const DAMAGE_RATE = 0.0006;
const RECOVERY_RATE = 0.0008;
const IRREVERSIBILITY = 0.72;
const BEAT_THRESH = 0.28;

// --- Text ---
const TEXTS = [
  { at: 0.92, text: 'each species finds its acoustic niche — Krause' },
  { at: 0.78, text: 'the forest looked unchanged' },
  { at: 0.62, text: 'the spectrogram told a different story' },
  { at: 0.48, text: 'the absence that testifies to damage — Carson' },
  { at: 0.33, text: 'silence is not the absence of sound — Cage' },
  { at: 0.20, text: 'the pure top-down prediction signal' },
  { at: 0.10, text: 'the more you\'ve listened \u00b7 the louder the silence' },
  { at: 0.04, text: 'fewer than twelve quiet places remain' }
];
let shownTexts = new Set();
let curText = null;
let textFade = 0;

// --- Stats ---
let diversity = 1;
let ghostTotal = 0;

// --- Spectrogram scroll timing ---
let specAccum = 0;
const SPEC_RATE = 40; // pixels per second

// === MAIN LOOP ===
function frame() {
  const now = performance.now();
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;
  time += dt;

  // --- Update species ---
  let activeSum = 0;
  species.forEach((s, i) => {
    if (s.continuous) {
      // Stream health follows ecosystem average
      const avg = species.reduce((a, sp) => a + (sp.continuous ? 0 : sp.health), 0) / (species.length - 1);
      s.health = avg;
      if (streamNodes) {
        streamNodes.gain.gain.setTargetAtTime(s.health * s.amp, audioCtx.currentTime, 0.15);
      }
      return;
    }

    // Cursor pressure
    if (mouseIn && my < ecoH) {
      const dist = Math.abs(s.y - my);
      if (dist < PRESSURE_R) {
        const p = (1 - dist / PRESSURE_R);
        s.health = Math.max(0, s.health - p * SUPPRESS_RATE);
        s.maxHealth = Math.max(0.01, s.maxHealth - p * DAMAGE_RATE);
      } else {
        recover(s);
      }
    } else {
      recover(s);
    }

    // Beat timing
    if (s.rhythm > 0 && time >= s.nextBeat) {
      if (s.health > BEAT_THRESH) {
        s.singing = 1;
        s.reps++;
        if (audioOn) playTone(s.freq, s.dur, s.amp * s.health);
      } else {
        // Omission ghost
        const intensity = Math.min(1, s.reps / 25);
        if (intensity > 0.05) {
          s.ghosts.push({
            x: W * 0.15 + Math.random() * W * 0.7,
            y: s.y,
            r: 0,
            alpha: 0.25 + intensity * 0.55,
            maxR: 25 + intensity * 45,
            speed: 50 + intensity * 30
          });
          ghostTotal++;
        }
      }
      const jitter = 0.7 + Math.random() * 0.6;
      s.nextBeat = time + s.rhythm * jitter;
    }

    s.singing = Math.max(0, s.singing - dt * 2.8);
    if (s.health > BEAT_THRESH) activeSum += s.health;
  });

  diversity = activeSum / (species.length - 1);

  // Text triggers
  TEXTS.forEach(t => {
    if (!shownTexts.has(t.at) && diversity <= t.at && diversity > t.at - 0.06) {
      shownTexts.add(t.at);
      curText = t.text;
      textFade = 4.0;
    }
  });
  if (textFade > 0) {
    textFade -= dt;
    const a = Math.min(1, textFade) * 0.65;
    insightEl.style.color = `rgba(175, 195, 175, ${a})`;
    insightEl.textContent = curText;
  } else {
    insightEl.style.color = 'rgba(0,0,0,0)';
  }

  // Dust
  dust.forEach(d => {
    d.x += d.vx;
    d.y += d.vy;
    if (d.y < -5) { d.y = ecoH + 5; d.x = Math.random() * W; }
    if (d.x < -5) d.x = W + 5;
    if (d.x > W + 5) d.x = -5;
  });

  // Ghosts update
  species.forEach(s => {
    s.ghosts = s.ghosts.filter(g => {
      g.r += dt * g.speed;
      g.alpha -= dt * 0.35;
      return g.alpha > 0.01 && g.r < g.maxR;
    });
  });

  // Particles update
  species.forEach(s => {
    s.particles.forEach(p => {
      p.phase += dt * (0.4 + Math.random() * 0.05);
      p.ox += p.vx;
      if (s.continuous) {
        // Stream flows rightward, wraps
        if (p.ox > W * 0.45) p.ox = -W * 0.45;
      } else {
        if (p.ox > W * 0.4) p.vx = -Math.abs(p.vx);
        if (p.ox < -W * 0.4) p.vx = Math.abs(p.vx);
      }
    });
  });

  // === RENDER ===
  // Background — shifts from green-tinted to gray as diversity drops
  const bgG = Math.floor(8 + diversity * 2);
  ctx.fillStyle = `rgb(6, ${bgG}, 8)`;
  ctx.fillRect(0, 0, W, H);

  // Subtle light shaft
  const lg = ctx.createLinearGradient(0, 0, W * 0.35, ecoH * 0.7);
  lg.addColorStop(0, `rgba(70, 90, 55, ${0.015 * diversity})`);
  lg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = lg;
  ctx.fillRect(0, 0, W, ecoH);

  // Band separators
  ctx.lineWidth = 0.5;
  species.forEach(s => {
    if (s.continuous) return;
    ctx.strokeStyle = `rgba(70, 90, 70, ${0.04 + s.health * 0.03})`;
    ctx.beginPath();
    ctx.moveTo(0, s.y);
    ctx.lineTo(W, s.y);
    ctx.stroke();
  });

  // Species labels
  ctx.font = '10px "JetBrains Mono", monospace';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  species.forEach(s => {
    if (s.continuous) return;
    const a = 0.1 + s.health * 0.2;
    ctx.fillStyle = `rgba(${s.col[0]}, ${s.col[1]}, ${s.col[2]}, ${a})`;
    ctx.fillText(s.name, 14, s.y);
  });

  // Hz labels (right side)
  ctx.textAlign = 'right';
  species.forEach(s => {
    if (s.continuous) return;
    const a = 0.06 + s.health * 0.1;
    ctx.fillStyle = `rgba(${s.col[0]}, ${s.col[1]}, ${s.col[2]}, ${a})`;
    ctx.fillText(`${s.freq} Hz`, W - 14, s.y);
  });
  ctx.textAlign = 'left';

  // Dust
  dust.forEach(d => {
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(110, 130, 100, ${d.alpha * diversity})`;
    ctx.fill();
  });

  // Species particles
  species.forEach(s => {
    // Stream particles — subtle flowing dots
    if (s.continuous) {
      s.particles.forEach(p => {
        const px = W * 0.5 + p.ox;
        const py = s.y + p.oy + Math.sin(p.phase) * 3;
        const alpha = s.health * 0.25;
        ctx.beginPath();
        ctx.arc(px, py, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${s.col[0]}, ${s.col[1]}, ${s.col[2]}, ${alpha})`;
        ctx.fill();
      });
      // Stream label
      const la = 0.08 + s.health * 0.12;
      ctx.fillStyle = `rgba(${s.col[0]}, ${s.col[1]}, ${s.col[2]}, ${la})`;
      ctx.textAlign = 'left';
      ctx.fillText(s.name, 14, s.y);
      return;
    }

    s.particles.forEach(p => {
      if (s.health < 0.03) return;
      const px = W * 0.5 + p.ox;
      const py = s.y + p.oy + Math.sin(p.phase * 0.7) * 4;
      const baseA = s.health * 0.55;
      const singA = s.singing * 0.45;
      const alpha = Math.min(1, baseA + singA);
      const sz = p.size * (0.4 + s.health * 0.6) * (1 + s.singing * 0.5);

      ctx.beginPath();
      ctx.arc(px, py, sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${s.col[0]}, ${s.col[1]}, ${s.col[2]}, ${alpha})`;
      ctx.fill();

      // Glow when singing — scale with beat duration (longer beats = bigger glow)
      if (s.singing > 0.15) {
        const glowScale = 2.0 + Math.min(s.dur, 1.0) * 2.0; // 2x for rapid, 4x for long
        ctx.beginPath();
        ctx.arc(px, py, sz * glowScale, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${s.col[0]}, ${s.col[1]}, ${s.col[2]}, ${s.singing * 0.1 * s.health})`;
        ctx.fill();
      }
    });
  });

  // Ghost omission pulses
  species.forEach(s => {
    s.ghosts.forEach(g => {
      // Dashed expanding ring
      ctx.beginPath();
      ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
      const gc = [
        Math.min(255, s.col[0] + 70),
        Math.min(255, s.col[1] + 70),
        Math.min(255, s.col[2] + 70)
      ];
      ctx.strokeStyle = `rgba(${gc[0]}, ${gc[1]}, ${gc[2]}, ${g.alpha * 0.5})`;
      ctx.lineWidth = 1.2;
      ctx.setLineDash([3, 5]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Bright center — the prediction signal
      ctx.beginPath();
      ctx.arc(g.x, g.y, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220, 225, 240, ${g.alpha * 0.85})`;
      ctx.fill();

      // Inner glow
      ctx.beginPath();
      ctx.arc(g.x, g.y, 8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${gc[0]}, ${gc[1]}, ${gc[2]}, ${g.alpha * 0.15})`;
      ctx.fill();
    });
  });

  // Cursor pressure zone
  if (mouseIn && my < ecoH) {
    ctx.beginPath();
    ctx.arc(mx, my, PRESSURE_R, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(180, 90, 70, 0.07)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Cursor dot
    ctx.beginPath();
    ctx.arc(mx, my, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(190, 150, 130, 0.35)';
    ctx.fill();
  }

  // === SPECTROGRAM STRIP ===
  specAccum += dt * SPEC_RATE;
  while (specAccum >= 1) {
    specAccum -= 1;
    specWriteX = (specWriteX + 1) % W;

    // Clear column
    specCtx.fillStyle = '#030503';
    specCtx.fillRect(specWriteX, 0, 2, specH);

    // Draw species contributions
    const margin = specH * 0.06;
    const usable = specH - margin * 2;
    species.forEach((s, i) => {
      if (s.continuous) return;
      // Low freq at bottom, high at top
      const relPos = i / (species.length - 1);
      const bandY = margin + usable * (1 - relPos);
      const bandH = usable / species.length * 0.55;

      if (s.health > BEAT_THRESH) {
        const bright = s.health * 0.25 + s.singing * s.health * 0.75;
        specCtx.fillStyle = `rgba(${s.col[0]}, ${s.col[1]}, ${s.col[2]}, ${bright})`;
        specCtx.fillRect(specWriteX, bandY - bandH / 2, 1, bandH);
      } else if (s.ghosts.length > 0) {
        // Ghost trace in spectrogram
        specCtx.fillStyle = 'rgba(200, 205, 220, 0.12)';
        specCtx.fillRect(specWriteX, bandY - 1, 1, 2);
      }
    });

    // Write-head line
    specCtx.fillStyle = 'rgba(100, 120, 100, 0.15)';
    specCtx.fillRect((specWriteX + 1) % W, 0, 1, specH);
  }

  // Draw spectrogram to main canvas (two-part for circular buffer)
  const rightW = W - specWriteX;
  if (rightW > 0) {
    ctx.drawImage(specCvs, specWriteX, 0, rightW, specH, 0, ecoH, rightW, specH);
  }
  if (specWriteX > 0) {
    ctx.drawImage(specCvs, 0, 0, specWriteX, specH, rightW, ecoH, specWriteX, specH);
  }

  // Spectrogram border
  ctx.strokeStyle = 'rgba(70, 90, 70, 0.12)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(0, ecoH);
  ctx.lineTo(W, ecoH);
  ctx.stroke();

  // Spectrogram frequency axis labels
  ctx.font = '9px "JetBrains Mono", monospace';
  ctx.fillStyle = 'rgba(120, 140, 120, 0.2)';
  ctx.textAlign = 'left';
  ctx.fillText('Hz', 5, ecoH + 10);
  const sMargin = specH * 0.06;
  const sUsable = specH - sMargin * 2;
  species.forEach((s, i) => {
    if (s.continuous) return;
    const relPos = i / (species.length - 1);
    const bandY = ecoH + sMargin + sUsable * (1 - relPos);
    ctx.fillStyle = `rgba(${s.col[0]}, ${s.col[1]}, ${s.col[2]}, 0.18)`;
    ctx.fillText(`${s.freq}`, 5, bandY + 3);
  });

  // Stats
  ctx.font = '10px "JetBrains Mono", monospace';
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(130, 150, 130, 0.35)';
  ctx.fillText(`diversity: ${(diversity * 100).toFixed(0)}%`, W - 16, 20);
  ctx.fillText(`omissions: ${ghostTotal}`, W - 16, 34);
  if (!audioOn) ctx.fillText('audio: off', W - 16, 48);
  ctx.textAlign = 'left';

  requestAnimationFrame(frame);
}

function recover(s) {
  const cap = 1 - (1 - s.maxHealth) * IRREVERSIBILITY;
  s.health = Math.min(cap, s.health + RECOVERY_RATE);
}

// --- Events ---
addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; mouseIn = true; });
addEventListener('mouseleave', () => { mouseIn = false; });
addEventListener('click', () => {
  if (!audioCtx) {
    initAudio();
  } else if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
});
addEventListener('resize', resize);

// --- Init ---
resize();
initDust();
frame();
</script>
</body>
</html>
