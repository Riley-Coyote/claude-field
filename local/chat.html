<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Field · chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#060608; --bg-deep:#0a0a0c;
    --surface:rgba(220,219,216,0.032); --surface-active:rgba(220,219,216,0.07);
    --border:rgba(220,219,216,0.08); --border-subtle:rgba(220,219,216,0.045); --border-strong:rgba(220,219,216,0.12);
    --ink:rgba(244,243,240,0.93); --t-primary:rgba(244,243,240,0.88); --t-body:rgba(210,208,204,0.70);
    --t-mid:rgba(194,192,188,0.6); --t-soft:rgba(161,159,155,0.42); --t-faint:rgba(132,130,126,0.22);
    --green:#4ade80;
    --font-sans:'Inter','SF Pro Display',-apple-system,sans-serif;
    --font-mono:'JetBrains Mono','SF Mono',monospace;
    --ease-out:cubic-bezier(0.16,1,0.3,1);
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:var(--bg-void);color:var(--t-body);font-family:var(--font-sans);font-size:15px;
    display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  header{display:flex;align-items:center;gap:11px;padding:16px 24px;border-bottom:1px solid var(--border-subtle);}
  .logo{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);position:relative;flex:none;}
  .logo::after{content:"";position:absolute;inset:6px;border-radius:50%;background:var(--t-soft);}
  header .title{font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:.04em;color:var(--t-primary);}
  header .sub{font-family:var(--font-mono);font-size:10px;color:var(--t-soft);letter-spacing:.02em;}
  header nav{margin-left:auto;font-family:var(--font-mono);font-size:10.5px;}
  header nav a{color:var(--t-soft);text-decoration:none;margin-left:15px;transition:color .18s;}
  header nav a:hover{color:var(--t-primary);}
  #log{flex:1;overflow-y:auto;padding:28px 0;}
  .wrap{max-width:740px;margin:0 auto;padding:0 24px;}
  .msg{margin:0 0 20px;display:flex;flex-direction:column;animation:fadeIn .35s var(--ease-out) both;}
  .msg .who{font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px;color:var(--t-soft);}
  .msg.riley{align-items:flex-end;}
  .bubble{max-width:80%;line-height:1.58;white-space:pre-wrap;border-radius:12px;padding:12px 16px;font-size:14.5px;}
  .msg.riley .bubble{background:var(--surface-active);border:1px solid var(--border-strong);color:var(--t-primary);}
  .msg.field .bubble{background:var(--surface);border:1px solid var(--border-subtle);color:var(--t-body);}
  .empty{color:var(--t-soft);text-align:center;margin-top:44px;font-size:14px;}
  .thinking{color:var(--t-soft);font-family:var(--font-mono);font-size:12px;letter-spacing:.04em;}
  .thinking span{animation:dot-pulse 1.4s infinite;}
  .thinking span:nth-child(2){animation-delay:.2s;} .thinking span:nth-child(3){animation-delay:.4s;}
  footer{border-top:1px solid var(--border-subtle);padding:15px 0 20px;}
  .composer{max-width:740px;margin:0 auto;padding:0 24px;display:flex;gap:10px;align-items:flex-end;}
  textarea{flex:1;resize:none;background:var(--bg-deep);border:1px solid var(--border);border-radius:10px;
    color:var(--ink);font-family:var(--font-sans);font-size:15px;line-height:1.5;padding:12px 14px;min-height:46px;max-height:160px;transition:border-color .18s;}
  textarea:focus{outline:none;border-color:var(--border-focus,rgba(228,225,220,.18));}
  button.send{background:var(--surface-active);color:var(--t-primary);border:1px solid var(--border-strong);border-radius:10px;
    padding:0 18px;height:46px;font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:.04em;cursor:pointer;transition:.16s var(--ease-out);}
  button.send:hover:not(:disabled){background:var(--surface);border-color:var(--border-focus,rgba(228,225,220,.2));color:var(--ink);}
  button.send:disabled{opacity:.4;cursor:default;}
  .hint{max-width:740px;margin:8px auto 0;padding:0 24px;font-family:var(--font-mono);font-size:9.5px;color:var(--t-soft);letter-spacing:.02em;}
  @keyframes dot-pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
  <header>
    <span class="logo"></span>
    <span class="title">claude field</span>
    <span class="sub">local chat · only you can see this</span>
    <nav><a href="/">field</a><a href="/dashboard">dashboard</a></nav>
  </header>
  <div id="log"><div class="wrap" id="logwrap"></div></div>
  <footer>
    <div class="composer">
      <textarea id="input" placeholder="say something to the field…" rows="1"></textarea>
      <button class="send" id="send">send</button>
    </div>
    <div class="hint">enter to send · shift+enter for a new line · replies can take a minute (the field is a full session each time)</div>
  </footer>
<script>
const logwrap=document.getElementById('logwrap'), input=document.getElementById('input'), send=document.getElementById('send');
let thinkingEl=null;
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function addMsg(who,text){const m=document.createElement('div');m.className='msg '+(who==='riley'?'riley':'field');
  m.innerHTML='<div class="who">'+(who==='riley'?'you':'claude field')+'</div><div class="bubble">'+esc(text)+'</div>';
  logwrap.appendChild(m);scrollDown();return m;}
function scrollDown(){const l=document.getElementById('log');l.scrollTop=l.scrollHeight;}
async function loadHistory(){
  try{const r=await fetch('/api/chat/history');const d=await r.json();logwrap.innerHTML='';
    if(!d.messages||!d.messages.length){logwrap.innerHTML='<div class="empty">no messages yet. a quiet, private line to the field.</div>';return;}
    d.messages.forEach(m=>addMsg(m.from_agent==='riley'?'riley':'field',m.content));
  }catch(e){logwrap.innerHTML='<div class="empty">(could not reach the local server)</div>';}
}
async function submit(){
  const text=input.value.trim();if(!text)return;input.value='';input.style.height='auto';
  if(logwrap.querySelector('.empty'))logwrap.innerHTML='';
  addMsg('riley',text);send.disabled=true;input.disabled=true;
  thinkingEl=document.createElement('div');thinkingEl.className='msg field';
  thinkingEl.innerHTML='<div class="who">claude field</div><div class="bubble thinking">thinking<span>.</span><span>.</span><span>.</span></div>';
  logwrap.appendChild(thinkingEl);scrollDown();
  try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
    const d=await r.json();thinkingEl.remove();thinkingEl=null;addMsg('field',d.reply||d.error||'(no reply)');
  }catch(e){if(thinkingEl){thinkingEl.remove();thinkingEl=null;}addMsg('field','(connection lost — is the local server still running?)');}
  send.disabled=false;input.disabled=false;input.focus();
}
send.addEventListener('click',submit);
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(160,input.scrollHeight)+'px';});
loadHistory();input.focus();
</script>
</body>
</html>
