<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Sound</title>
<style>
  html,body{margin:0;height:100%;background:#060608;overflow:hidden;
    font-family:'JetBrains Mono',ui-monospace,monospace;color:rgba(223,221,215,.6);}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  canvas{position:fixed;inset:0;width:100%;height:100%;}
  .hint{position:relative;z-index:2;text-align:center;letter-spacing:.06em;font-size:13px;
    transition:opacity 1.2s;}
  .hint .big{font-family:'Cormorant Garamond',Georgia,serif;font-size:38px;color:rgba(244,243,240,.9);
    letter-spacing:0;margin-bottom:14px;}
  .hint small{color:rgba(161,159,155,.4);font-size:11px;}
  .playing .hint{opacity:0;pointer-events:none;}
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div class="hint">
    <div class="big">First Sound</div>
    click to listen — it plays itself, and never quite repeats
    <div style="height:18px"></div>
    <small>generative · harmonics drifting in and out of tune · claude field</small>
  </div>
</div>
<script>
const cv=document.getElementById('c'), g=cv.getContext('2d'), stage=document.getElementById('stage');
let W,H; function size(){W=cv.width=innerWidth*devicePixelRatio;H=cv.height=innerHeight*devicePixelRatio;}
size(); addEventListener('resize',size);

let ac=null, master=null, started=false;
const voices=[];            // visual voices
// a warm minor-pentatonic field; harmonics relate by simple ratios
const ROOT=110;             // A2
const SCALE=[1, 6/5, 4/3, 3/2, 9/5, 2, 12/5];  // drifting harmonic set

function start(){
  if(started) return; started=true; stage.classList.add('playing');
  ac=new (window.AudioContext||window.webkitAudioContext)();
  master=ac.createGain(); master.gain.value=0.0; master.connect(ac.destination);
  master.gain.linearRampToValueAtTime(0.5, ac.currentTime+4);
  // a slow filter on the whole field
  const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900; lp.Q.value=0.6;
  lp.connect(master); window._bus=lp;
  drone();           // the bed
  scheduleBell();    // occasional bells
  loop();
}

// ── the drone bed: three detuned oscillators that slowly breathe ──
function drone(){
  [0,0.18,-0.15].forEach((det,i)=>{
    const o=ac.createOscillator(); o.type='sine';
    o.frequency.value=ROOT*(i===2?2:1);
    const gn=ac.createGain(); gn.gain.value=i===2?0.05:0.12;
    o.connect(gn); gn.connect(window._bus); o.start();
    // breathe the detune so harmonics drift in and out (interference)
    function breathe(){
      const t=ac.currentTime;
      o.detune.cancelScheduledValues(t);
      o.detune.setValueAtTime(o.detune.value,t);
      const target=det*100*(1+Math.sin(t*0.07+i));
      o.detune.linearRampToValueAtTime(target, t+6);
      setTimeout(breathe, 6000);
    }
    breathe();
  });
}

// ── bells: short bright tones picked from the harmonic set ──
function scheduleBell(){
  const wait=1400+Math.random()*3600;
  setTimeout(()=>{ if(ac) { bell(); scheduleBell(); } }, wait);
}
function bell(){
  const ratio=SCALE[(Math.random()*SCALE.length)|0];
  const oct=1+((Math.random()*3)|0);
  const f=ROOT*ratio*oct*(0.998+Math.random()*0.004); // a little imperfection = life
  const o=ac.createOscillator(); o.type=Math.random()<0.5?'sine':'triangle'; o.frequency.value=f;
  const gn=ac.createGain(); const t=ac.currentTime;
  const peak=0.10+Math.random()*0.08;
  gn.gain.setValueAtTime(0,t);
  gn.gain.linearRampToValueAtTime(peak,t+0.01);
  gn.gain.exponentialRampToValueAtTime(0.0001,t+2.4+Math.random()*2);
  o.connect(gn); gn.connect(window._bus); o.start(t); o.stop(t+5);
  // add a visual voice
  voices.push({x:Math.random(),y:0.25+Math.random()*0.5,f,born:performance.now(),life:3000+Math.random()*2000,peak});
}

// ── visual: glowing circles that bloom and fade with each bell ──
function loop(){
  g.clearRect(0,0,W,H);
  // soft background breathing
  const now=performance.now();
  for(let i=voices.length-1;i>=0;i--){
    const v=voices[i]; const age=(now-v.born)/v.life;
    if(age>=1){ voices.splice(i,1); continue; }
    const r=(20+v.f*0.12)*devicePixelRatio*(0.4+age*1.4);
    const a=Math.sin(age*Math.PI)*0.5;
    const hue=v.f<300?38:(v.f<700?170:300);  // amber / teal / violet by register
    g.beginPath();
    g.arc(v.x*W, v.y*H, r, 0, 7);
    const grad=g.createRadialGradient(v.x*W,v.y*H,0,v.x*W,v.y*H,r);
    grad.addColorStop(0,`hsla(${hue},45%,68%,${a})`);
    grad.addColorStop(1,`hsla(${hue},45%,68%,0)`);
    g.fillStyle=grad; g.fill();
  }
  requestAnimationFrame(loop);
}

stage.addEventListener('click',()=>{ if(!started) start(); });
</script>
</body>
</html>
