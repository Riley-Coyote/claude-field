<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rain on the Pane</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Inter+Tight:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --floor:#060608;
    --ink-1:rgba(255,255,255,.92);
    --ink-2:rgba(255,255,255,.58);
    --ink-3:rgba(255,255,255,.34);
    --ink-4:rgba(255,255,255,.16);
    --line:rgba(255,255,255,.09);
    --lit:rgba(255,255,255,.14);
    --fill:rgba(255,255,255,.035);
    --fill-hover:rgba(255,255,255,.06);
    --signal:#6d93c9;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Inter',system-ui,sans-serif;
    --disp:'Inter Tight','Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--floor);
    color:var(--ink-1);
    font-family:var(--sans);
    font-weight:300;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #glass{position:fixed;inset:0;display:block}

  /* ---- masthead ---- */
  .masthead{
    position:fixed;top:26px;left:30px;z-index:5;
    pointer-events:none;
    display:flex;align-items:baseline;gap:12px;
  }
  .title{
    font-family:var(--disp);
    font-weight:400;
    font-size:19px;
    letter-spacing:.01em;
    color:var(--ink-1);
  }
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--ink-4);
    transition:background .6s ease;
    align-self:center;
  }
  .dot.live{
    background:var(--signal);
    animation:breathe 3.4s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{opacity:.4}50%{opacity:1}}
  .sub{
    position:fixed;top:52px;left:30px;z-index:5;
    pointer-events:none;
    font-size:12.5px;color:var(--ink-3);letter-spacing:.02em;
  }

  /* ---- console ---- */
  .console{
    position:fixed;left:30px;bottom:30px;z-index:5;
    width:288px;max-width:calc(100vw - 60px);
    padding:20px 20px 18px;
    background:rgba(10,10,13,.62);
    backdrop-filter:blur(14px) saturate(1.1);
    -webkit-backdrop-filter:blur(14px) saturate(1.1);
    border:1px solid var(--line);
    border-radius:12px;
    box-shadow:0 1px 0 var(--lit) inset, 0 18px 44px rgba(0,0,0,.5);
  }
  .row{margin-bottom:16px}
  .row:last-of-type{margin-bottom:0}
  .row-head{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:9px;
  }
  .row-head label{
    font-size:11px;letter-spacing:.11em;text-transform:uppercase;
    color:var(--ink-2);font-weight:400;
  }
  .val{font-family:var(--mono);font-size:11.5px;color:var(--ink-3)}

  input[type=range]{
    -webkit-appearance:none;appearance:none;
    width:100%;height:22px;background:transparent;cursor:pointer;
  }
  input[type=range]:focus{outline:none}
  input[type=range]::-webkit-slider-runnable-track{
    height:3px;border-radius:2px;
    background:rgba(255,255,255,.10);
  }
  input[type=range]::-moz-range-track{
    height:3px;border-radius:2px;background:rgba(255,255,255,.10);
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;
    width:13px;height:13px;margin-top:-5px;border-radius:50%;
    background:#12131a;
    border:1px solid var(--line);
    box-shadow:0 1px 0 var(--lit) inset,0 2px 5px rgba(0,0,0,.5);
    transition:border-color .15s ease,transform .15s ease;
  }
  input[type=range]::-moz-range-thumb{
    width:13px;height:13px;border-radius:50%;
    background:#12131a;border:1px solid var(--line);
    box-shadow:0 1px 0 var(--lit) inset,0 2px 5px rgba(0,0,0,.5);
  }
  input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.08)}
  input[type=range]:focus::-webkit-slider-thumb{border-color:rgba(255,255,255,.5)}
  input[type=range]:active::-webkit-slider-thumb{border-color:rgba(255,255,255,.62)}

  .btnrow{display:flex;gap:9px;margin-top:20px}
  button{
    flex:1;
    font-family:var(--sans);font-size:12px;font-weight:400;
    letter-spacing:.03em;color:var(--ink-1);
    padding:9px 10px;
    background:var(--fill);
    border:1px solid var(--line);
    border-radius:8px;
    box-shadow:0 1px 0 var(--lit) inset;
    cursor:pointer;
    transition:background .15s ease,border-color .15s ease;
  }
  button:hover{background:var(--fill-hover)}
  button:focus{outline:none;border-color:rgba(255,255,255,.5)}
  button:active{background:rgba(255,255,255,.09)}
  button:disabled{color:var(--ink-4);cursor:default;background:transparent}

  /* ---- start veil ---- */
  .veil{
    position:fixed;inset:0;z-index:20;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;
    background:radial-gradient(120% 90% at 50% 42%, rgba(12,13,18,.2), rgba(6,6,8,.86));
    cursor:pointer;
    transition:opacity .7s ease;
  }
  .veil-title{font-family:var(--disp);font-weight:300;font-size:34px;letter-spacing:.005em;color:var(--ink-1)}
  .veil-sub{font-size:13px;color:var(--ink-3);letter-spacing:.03em}
  .veil-cta{
    margin-top:6px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--ink-2);
    padding:11px 26px;border:1px solid var(--line);border-radius:999px;
    box-shadow:0 1px 0 var(--lit) inset;
    transition:border-color .2s ease,color .2s ease;
  }
  .veil:hover .veil-cta{border-color:rgba(255,255,255,.28);color:var(--ink-1)}
  .veil.gone{opacity:0;pointer-events:none}

  @media (prefers-reduced-motion:reduce){
    .dot.live{animation:none;opacity:.9}
  }
</style>
</head>
<body>
<canvas id="glass"></canvas>

<div class="masthead"><span class="title">Rain on the Pane</span><span class="dot" id="dot"></span></div>
<div class="sub">a generative window &middot; leave it running</div>

<div class="console" id="console" aria-hidden="true">
  <div class="row">
    <div class="row-head"><label>Rain</label><span class="val" id="v-rain">—</span></div>
    <input type="range" id="rain" min="0" max="1" step="0.001" value="0.4">
  </div>
  <div class="row">
    <div class="row-head"><label>Wind</label><span class="val" id="v-wind">—</span></div>
    <input type="range" id="wind" min="0" max="1" step="0.001" value="0.3">
  </div>
  <div class="row">
    <div class="row-head"><label>Nearness</label><span class="val" id="v-near">—</span></div>
    <input type="range" id="near" min="0" max="1" step="0.001" value="0.5">
  </div>
  <div class="btnrow">
    <button id="thunder">Thunder</button>
    <button id="toggle">Pause</button>
  </div>
</div>

<div class="veil" id="veil">
  <div class="veil-title">Rain on the Pane</div>
  <div class="veil-sub">generative rain, shaped by hand &middot; sound on</div>
  <div class="veil-cta">Begin</div>
</div>

<script>
(() => {
  "use strict";
  const cv = document.getElementById('glass');
  const cx = cv.getContext('2d');
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;

  let W,H,DPR;
  function resize(){
    DPR = Math.min(devicePixelRatio||1, 2);
    W = innerWidth; H = innerHeight;
    cv.width = W*DPR; cv.height = H*DPR;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    cx.setTransform(DPR,0,0,DPR,0,0);
  }
  addEventListener('resize', resize); resize();

  // ---------- parameters ----------
  const P = { rain:0.4, wind:0.3, near:0.5, running:false };

  // ---------- audio ----------
  let A=null; // audio graph
  function buildAudio(){
    const ctx = new (window.AudioContext||window.webkitAudioContext)();

    // noise buffers
    const white = noise(ctx, 2, 'white');
    const brown = noise(ctx, 4, 'brown');

    // master chain
    const master = ctx.createGain(); master.gain.value = 0.0001;
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value=-20; comp.knee.value=24; comp.ratio.value=3.5;
    comp.attack.value=0.005; comp.release.value=0.25;
    comp.connect(master); master.connect(ctx.destination);

    // reverb (the room behind the glass)
    const conv = ctx.createConvolver(); conv.buffer = impulse(ctx,2.8,2.4);
    const wet = ctx.createGain(); wet.gain.value=0.26;
    const dry = ctx.createGain(); dry.gain.value=0.9;
    const bus = ctx.createGain(); bus.gain.value=0.9;
    bus.connect(dry); dry.connect(comp);
    bus.connect(conv); conv.connect(wet); wet.connect(comp);

    // rain bed: brown noise -> lowpass -> gain
    const bedSrc = ctx.createBufferSource(); bedSrc.buffer=brown; bedSrc.loop=true;
    const bedLP = ctx.createBiquadFilter(); bedLP.type='lowpass'; bedLP.frequency.value=1400; bedLP.Q.value=0.4;
    const bedHP = ctx.createBiquadFilter(); bedHP.type='highpass'; bedHP.frequency.value=180;
    const bedGain = ctx.createGain(); bedGain.gain.value=0.14;
    bedSrc.connect(bedHP); bedHP.connect(bedLP); bedLP.connect(bedGain); bedGain.connect(bus);
    bedSrc.start();

    // wind: slow LFO modulating bed cutoff + gain
    const windOsc = ctx.createOscillator(); windOsc.type='sine'; windOsc.frequency.value=0.07;
    const windDepthF = ctx.createGain(); windDepthF.gain.value=600;
    const windDepthG = ctx.createGain(); windDepthG.gain.value=0.05;
    windOsc.connect(windDepthF); windDepthF.connect(bedLP.frequency);
    windOsc.connect(windDepthG); windDepthG.connect(bedGain.gain);
    windOsc.start();

    // fade in
    master.gain.exponentialRampToValueAtTime(0.85, ctx.currentTime+1.4);

    A = { ctx, white, brown, comp, bus, master, bedLP, bedGain, windDepthF, windDepthG,
          gliss:{running:true} };
    return A;
  }

  // one droplet: bandpass-excited noise burst + faint resonant ring
  function droplet(t, near){
    const {ctx, white, bus} = A;
    const src = ctx.createBufferSource(); src.buffer=white; src.loop=true;
    // random start read position for variety
    src.playbackRate.value = 0.85 + Math.random()*0.4;
    const bp = ctx.createBiquadFilter(); bp.type='bandpass';
    const base = 700 + Math.random()*2600;
    bp.frequency.value = base;
    bp.Q.value = 6 + Math.random()*12;
    const g = ctx.createGain();
    const pan = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
    if(pan) pan.pan.value = (Math.random()*2-1)*0.7;
    const peak = (0.05 + Math.random()*0.09) * (0.6 + near*0.7);
    const dec = 0.03 + Math.random()*0.08;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(peak, t+0.003);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.004+dec);
    src.connect(bp); bp.connect(g);
    (pan ? (g.connect(pan), pan) : g).connect(bus);
    src.start(t); src.stop(t+0.05+dec+0.05);

    // occasional resonant "ting" on glass — a quick damped sine
    if(Math.random() < 0.14 + near*0.10){
      const o = ctx.createOscillator(); o.type='sine';
      o.frequency.value = base*1.5 + Math.random()*400;
      const og = ctx.createGain();
      const rp = (0.02+Math.random()*0.03)*(0.5+near*0.6);
      og.gain.setValueAtTime(0.0001,t);
      og.gain.linearRampToValueAtTime(rp, t+0.004);
      og.gain.exponentialRampToValueAtTime(0.0001, t+0.35);
      o.connect(og); og.connect(bus); o.start(t); o.stop(t+0.4);
    }
  }

  // a rivulet running down the pane — descending bandpass sweep
  function rivulet(t){
    const {ctx, white, bus} = A;
    const src = ctx.createBufferSource(); src.buffer=white; src.loop=true;
    const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=9;
    const dur = 0.9 + Math.random()*1.1;
    bp.frequency.setValueAtTime(1800+Math.random()*900, t);
    bp.frequency.exponentialRampToValueAtTime(240+Math.random()*160, t+dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(0.035, t+0.15);
    g.gain.linearRampToValueAtTime(0.028, t+dur*0.7);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    const pan = ctx.createStereoPanner? ctx.createStereoPanner():null;
    if(pan) pan.pan.value=(Math.random()*2-1)*0.5;
    src.connect(bp); bp.connect(g);
    (pan?(g.connect(pan),pan):g).connect(bus);
    src.start(t); src.stop(t+dur+0.1);
  }

  function thunder(){
    if(!A) return;
    const {ctx, brown, bus} = A;
    const t = ctx.currentTime + 0.02;
    const src = ctx.createBufferSource(); src.buffer=brown; src.loop=true;
    const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=140; lp.Q.value=0.6;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(0.34, t+0.35);
    g.gain.linearRampToValueAtTime(0.22, t+1.2);
    g.gain.exponentialRampToValueAtTime(0.0001, t+3.6);
    // slow rumble wobble
    const wob = ctx.createOscillator(); wob.type='sine'; wob.frequency.value=1.6;
    const wobg = ctx.createGain(); wobg.gain.value=30;
    wob.connect(wobg); wobg.connect(lp.frequency); wob.start(t); wob.stop(t+3.8);
    src.connect(lp); lp.connect(g); g.connect(bus);
    src.start(t); src.stop(t+3.8);
    flash();
  }

  // ---------- schedulers ----------
  let dropTimer=null;
  function scheduleDrops(){
    if(!A || !P.running){ dropTimer=null; return; }
    const now = A.ctx.currentTime;
    // rate: drops/sec, exponential from calm to downpour
    const rate = 1.2 * Math.pow(60, P.rain);      // ~1.2 .. ~72
    droplet(now+0.01, P.near);
    spawnVisual(P.near);
    // rivulet chance scales with rain
    if(Math.random() < 0.012 + P.rain*0.05) rivulet(now+0.02);
    const wait = -Math.log(Math.random()) / rate; // exponential inter-onset
    dropTimer = setTimeout(scheduleDrops, Math.max(6, wait*1000));
  }

  function applyParams(){
    if(!A) return;
    const t=A.ctx.currentTime;
    // bed brightness/level rise with rain; nearness raises cutoff
    A.bedLP.frequency.setTargetAtTime(700 + P.rain*1900 + P.near*700, t, 0.3);
    A.bedGain.gain.setTargetAtTime(0.05 + P.rain*0.17, t, 0.3);
    // wind depth
    A.windDepthF.gain.setTargetAtTime(200 + P.wind*1400, t, 0.4);
    A.windDepthG.gain.setTargetAtTime(0.01 + P.wind*0.10, t, 0.4);
  }

  // ---------- noise / impulse helpers ----------
  function noise(ctx, secs, type){
    const len = Math.floor(ctx.sampleRate*secs);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    if(type==='white'){ for(let i=0;i<len;i++) d[i]=Math.random()*2-1; }
    else { // brown
      let last=0;
      for(let i=0;i<len;i++){ const w=Math.random()*2-1; last=(last+0.02*w)/1.02; d[i]=last*3.4; }
    }
    return buf;
  }
  function impulse(ctx, secs, decay){
    const len=Math.floor(ctx.sampleRate*secs);
    const buf=ctx.createBuffer(2,len,ctx.sampleRate);
    for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len, decay); }
    return buf;
  }

  // ---------- visuals ----------
  const drops=[];   // impact rings
  const runners=[]; // sliding beads with trails
  let flashT=0;

  function spawnVisual(near){
    const x = Math.random()*W;
    const y = Math.random()*H*0.9;
    const big = Math.random() < 0.5+near*0.3;
    drops.push({x,y, r:0, max: (big?5:3)+Math.random()*3*(0.5+near), life:1});
    // some drops become runners sliding down
    if(Math.random() < 0.16 + near*0.12){
      runners.push({x, y, vy: 12+Math.random()*30, r:1.4+Math.random()*2.2,
                    life:1, trail:[]});
    }
  }
  function flash(){ flashT = 1; }

  let last=performance.now();
  function frame(t){
    const dt = Math.min(0.05,(t-last)/1000); last=t;

    // wet-glass background: near-black with a faint cool vignette
    cx.fillStyle = '#060608';
    cx.fillRect(0,0,W,H);
    const vg = cx.createRadialGradient(W*0.5,H*0.35, 40, W*0.5,H*0.5, Math.max(W,H)*0.75);
    vg.addColorStop(0,'rgba(24,27,34,0.5)');
    vg.addColorStop(1,'rgba(6,6,8,0)');
    cx.fillStyle=vg; cx.fillRect(0,0,W,H);

    // lightning flash
    if(flashT>0){
      cx.fillStyle = `rgba(150,168,196,${flashT*0.18})`;
      cx.fillRect(0,0,W,H);
      flashT = Math.max(0, flashT - dt* (reduce?6:2.2));
    }

    // impact rings
    for(let i=drops.length-1;i>=0;i--){
      const d=drops[i];
      d.r += (d.max-d.r)*(reduce?1:0.18);
      d.life -= dt*1.6;
      if(d.life<=0){ drops.splice(i,1); continue; }
      const a = d.life*0.5;
      cx.beginPath(); cx.arc(d.x,d.y,d.r,0,7);
      cx.strokeStyle=`rgba(200,214,236,${a*0.6})`; cx.lineWidth=1; cx.stroke();
      cx.beginPath(); cx.arc(d.x,d.y,d.r*0.4,0,7);
      cx.fillStyle=`rgba(224,232,246,${a*0.45})`; cx.fill();
    }

    // runners
    for(let i=runners.length-1;i>=0;i--){
      const r=runners[i];
      if(!reduce){
        r.vy += 40*dt;               // gravity-ish
        r.y += r.vy*dt;
        r.trail.push({x:r.x,y:r.y});
        if(r.trail.length>14) r.trail.shift();
        r.x += (Math.random()-0.5)*0.6; // slight wander
      }
      r.life -= dt*0.5;
      if(r.y>H+10 || r.life<=0){ runners.splice(i,1); continue; }
      // trail
      for(let j=0;j<r.trail.length;j++){
        const p=r.trail[j]; const a=(j/r.trail.length)*r.life*0.28;
        cx.beginPath(); cx.arc(p.x,p.y, r.r*0.5*(j/r.trail.length),0,7);
        cx.fillStyle=`rgba(180,198,224,${a})`; cx.fill();
      }
      // bead with a lit top edge
      cx.beginPath(); cx.arc(r.x,r.y,r.r,0,7);
      cx.fillStyle=`rgba(210,222,242,${r.life*0.55})`; cx.fill();
      cx.beginPath(); cx.arc(r.x-r.r*0.3,r.y-r.r*0.3, r.r*0.35,0,7);
      cx.fillStyle=`rgba(255,255,255,${r.life*0.4})`; cx.fill();
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---------- UI wiring ----------
  const el = id => document.getElementById(id);
  const fmt = v => v.toFixed(2);
  function refreshReadouts(){
    el('v-rain').textContent = fmt(P.rain) + '  ·  ' + Math.round(1.2*Math.pow(60,P.rain)) + '/s';
    el('v-wind').textContent = fmt(P.wind);
    el('v-near').textContent = fmt(P.near);
  }
  el('rain').addEventListener('input', e=>{P.rain=+e.target.value; applyParams(); refreshReadouts();});
  el('wind').addEventListener('input', e=>{P.wind=+e.target.value; applyParams(); refreshReadouts();});
  el('near').addEventListener('input', e=>{P.near=+e.target.value; applyParams(); refreshReadouts();});
  el('thunder').addEventListener('click', thunder);

  el('toggle').addEventListener('click', ()=>{
    P.running = !P.running;
    el('toggle').textContent = P.running ? 'Pause':'Resume';
    el('dot').classList.toggle('live', P.running);
    if(A){ A.master.gain.setTargetAtTime(P.running?0.85:0.0001, A.ctx.currentTime, 0.25); }
    if(P.running && !dropTimer) scheduleDrops();
  });

  function begin(){
    if(A) return;
    buildAudio();
    P.running = true;
    applyParams(); refreshReadouts();
    el('dot').classList.add('live');
    el('console').setAttribute('aria-hidden','false');
    el('veil').classList.add('gone');
    scheduleDrops();
    setTimeout(()=>{ const v=el('veil'); if(v) v.style.display='none'; }, 800);
  }
  el('veil').addEventListener('click', begin);
  refreshReadouts();

  // expose a little state for headless verification
  window.__rain = { get ctx(){return A&&A.ctx;}, get running(){return P.running;},
                    get drops(){return drops.length;}, get runners(){return runners.length;} };
})();
</script>
</body>
</html>
